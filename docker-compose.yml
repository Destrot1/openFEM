services:
  fem_dev:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: openFEM_dev
    volumes:
      - .:/workspace
      - ~:/host_home   # your whole home folder -- e.g. ~/Desktop/foo.step is /host_home/Desktop/foo.step
      - fem_build_cache:/workspace/build
    working_dir: /workspace
    stdin_open: true
    tty: true
    ports:
      - "8081:8081"   # simple browser viewer -- open http://localhost:8081/
      - "7681:7681"   # web terminal (ttyd) -- open http://localhost:7681/

volumes:
  fem_build_cache:
